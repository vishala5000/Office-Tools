<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate PDF Toolkit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
}

/* HEADER */
header {
    background: #111827;
    color: white;
    text-align: center;
    padding: 25px;
}

header h1 {
    font-size: 24px;
}

/* MAIN LAYOUT */
.main-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    max-width: 1600px;
    margin: 20px auto;
    gap: 20px;
    padding: 0 10px;
}

/* SIDE ADS */
.ad-side {
    width: 160px;
    min-width: 160px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* CENTER TOOL */
.tool-container {
    flex: 1;
    max-width: 1000px;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

iframe {
    width: 100%;
    height: 85vh;
    border: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #111827;
    color: white;
    margin-top: 30px;
    font-size: 14px;
}

/* ✅ RESPONSIVE */
@media (max-width: 1024px) {
    .ad-side {
        display: none;
    }

    iframe {
        height: 80vh;
    }
}

@media (max-width: 600px) {
    header h1 {
        font-size: 20px;
    }

    iframe {
        height: 75vh;
    }
}
</style>
</head>

<body>

<header>
    <h1>🚀 Ultimate PDF Toolkit</h1>
</header>

<div class="main-wrapper">

    <!-- ✅ LEFT BANNER -->
    <div class="ad-side">
        <script async data-cfasync="false"
        src="https://pl29710234.effectivecpmnetwork.com/LEFT_ZONE_ID/invoke.js">
        </script>
        <div id="container-LEFT_ZONE_ID"></div>
    </div>

    <!-- ✅ CENTER TOOL -->
    <div class="tool-container">
        <iframe src="https://vishala5005-office-tools.hf.space" allowfullscreen></iframe>
    </div>

    <!-- ✅ RIGHT BANNER -->
    <div class="ad-side">
        <script async data-cfasync="false"
        src="https://pl29710234.effectivecpmnetwork.com/RIGHT_ZONE_ID/invoke.js">
        </script>
        <div id="container-RIGHT_ZONE_ID"></div>
    </div>

</div>

<footer>
    © 2026 Ultimate PDF Toolkit
</footer>

</body>
</html>
