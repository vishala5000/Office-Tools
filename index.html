<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate PDF Toolkit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #111827, #1e3a8a);
    color: white;
    text-align: center;
    padding: 30px 15px;
}

header h1 {
    font-size: 28px;
}

/* MAIN LAYOUT */
.main-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    max-width: 1600px;
    margin: 20px auto;
    padding: 0 10px;
    gap: 20px;
}

/* LEFT & RIGHT ADS */
.ad-side {
    width: 160px;
    min-width: 160px;
    background: white;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* CENTER TOOL */
.tool-container {
    flex: 1;
    max-width: 1000px;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

iframe {
    width: 100%;
    height: 85vh;
    border: none;
}

/* FOOTER */
footer {
    background: #111827;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 30px;
    font-size: 14px;
}

/* ✅ RESPONSIVE RULES */

/* Hide side ads on tablets & mobiles */
@media (max-width: 1024px) {
    .ad-side {
        display: none;
    }

    .main-wrapper {
        padding: 0 5px;
    }

    iframe {
        height: 80vh;
    }
}

/* Mobile */
@media (max-width: 600px) {
    header h1 {
        font-size: 22px;
    }

    iframe {
        height: 75vh;
    }
}
</style>
</head>

<body>

<header>
    <h1>🚀 Ultimate PDF Toolkit</h1>
</header>

<div class="main-wrapper">

    <!-- ✅ LEFT BANNER -->
    <div class="ad-side">
        <script async="async" data-cfasync="false"
            src="https://pl29710234.effectivecpmnetwork.com/eb3c621e9d8f277dae4be750141c4914/invoke.js">
        </script>
        <div id="container-eb3c621e9d8f277dae4be750141c4914-left"></div>
    </div>

    <!-- ✅ CENTER TOOL -->
    <div class="tool-container">
        <iframe src="https://vishala5005-office-tools.hf.space" allowfullscreen></iframe>
    </div>

    <!-- ✅ RIGHT BANNER -->
    <div class="ad-side">
        <script async="async" data-cfasync="false"
            src="https://pl29710234.effectivecpmnetwork.com/eb3c621e9d8f277dae4be750141c4914/invoke.js">
        </script>
        <div id="container-eb3c621e9d8f277dae4be750141c4914-right"></div>
    </div>

</div>

<footer>
    © 2026 Ultimate PDF Toolkit
</footer>

</body>
</html>
